services:
  postgres:
    image: postgres:15
    container_name: payment_processor_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: setu_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: payment_adminer
    ports:
      - "8082:8080"
    depends_on:
      - postgres

volumes:
  postgres_data: